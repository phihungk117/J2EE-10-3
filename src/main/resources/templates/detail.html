<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Space Grotesk", sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-sky-50 text-slate-800">
<div class="mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
    <div class="mb-6">
        <a th:href="@{/products}" class="text-sm font-semibold text-sky-600 hover:text-sky-700">
            &larr; Back to Products
        </a>
    </div>
    
    <div class="rounded-3xl border border-white/70 bg-white/80 p-6 shadow-2xl backdrop-blur sm:p-10">
        <div class="grid grid-cols-1 gap-10 md:grid-cols-2">
            <!-- Product Image -->
            <div class="flex items-center justify-center rounded-2xl bg-slate-50 p-6">
                <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                     th:src="${product.image}" alt="Product Image"
                     class="max-h-96 w-full rounded-2xl object-cover shadow-lg">
                <div th:if="${product.image == null or #strings.isEmpty(product.image)}"
                     class="flex h-64 w-full items-center justify-center rounded-2xl bg-slate-200 text-slate-400">
                    <span class="font-medium">No Image Available</span>
                </div>
            </div>
            
            <!-- Product Info -->
            <div class="flex flex-col justify-center">
                <p class="mb-2 text-sm font-semibold uppercase tracking-widest text-indigo-500" 
                   th:text="${product.category != null ? product.category.name : 'Uncategorized'}"></p>
                <h1 class="mb-4 text-4xl font-bold text-slate-900" th:text="${product.name}"></h1>
                
                <p class="mb-8 text-3xl font-semibold text-emerald-600">
                    $<span th:text="${product.price}"></span>
                </p>
                
                <div class="mt-auto">
                    <form th:action="@{/cart/add}" method="post" class="flex items-end gap-4" sec:authorize="hasRole('USER')">
                        <input type="hidden" name="productId" th:value="${product.id}" />
                        
                        <div class="flex flex-col">
                            <label class="mb-2 text-sm font-semibold text-slate-700">Quantity</label>
                            <input type="number" name="quantity" value="1" min="1" max="100"
                                   class="w-24 rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-sky-500">
                        </div>
                        
                        <button type="submit"
                                class="flex-1 rounded-xl bg-sky-600 px-8 py-3 font-bold text-white shadow-lg shadow-sky-200 transition-transform hover:-translate-y-1 hover:bg-sky-700">
                            Add to Cart &rarr;
                        </button>
                    </form>
                    
                    <div sec:authorize="!isAuthenticated()" class="mt-6 rounded-xl bg-amber-50 p-4 border border-amber-200">
                        <p class="text-sm font-medium text-amber-800">
                            You need to <a href="/login" class="underline font-bold">login</a> to add this item to cart.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
