<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Space Grotesk", sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-sky-50 via-white to-indigo-50 text-slate-800">
<div class="mx-auto max-w-3xl px-4 py-10 sm:px-6 lg:px-8">
    <div class="rounded-3xl border border-white/70 bg-white/90 p-6 shadow-2xl shadow-sky-100 sm:p-8">
        <div class="mb-6">
            <p class="text-sm font-semibold uppercase tracking-[0.2em] text-sky-600">Product Form</p>
            <h1 class="mt-1 text-3xl font-bold text-slate-900">Edit Product</h1>
        </div>

        <form th:action="@{/products/edit}" th:object="${product}" method="post" enctype="multipart/form-data" class="space-y-5">
            <input type="hidden" th:field="*{id}">

            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">Name</label>
                <input type="text" th:field="*{name}"
                       class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none ring-sky-500 transition focus:ring-2">
                <div class="mt-1 text-sm text-rose-600" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">Price</label>
                <input type="number" step="0.01" th:field="*{price}"
                       class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none ring-sky-500 transition focus:ring-2">
                <div class="mt-1 text-sm text-rose-600" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">Change Image (Optional)</label>
                <input type="file" name="imageFile" accept="image/*"
                       class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none ring-sky-500 transition focus:ring-2">
            </div>

            <div th:if="${product.image != null and !#strings.isEmpty(product.image)}" class="rounded-xl border border-slate-200 p-3">
                <p class="mb-2 text-xs font-semibold uppercase tracking-wider text-slate-500">Current image preview</p>
                <img th:src="${product.image}" alt="Current product image" class="h-28 w-28 rounded-lg object-cover">
            </div>

            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">Category</label>
                <select th:field="*{category.id}"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none ring-sky-500 transition focus:ring-2">
                    <option value="">-- Select Category --</option>
                    <option th:each="cat : ${listCategory}" th:value="${cat.id}" th:text="${cat.name}"
                            th:selected="${cat.id == product.category?.id}"></option>
                </select>
            </div>

            <div class="flex flex-col-reverse gap-3 pt-2 sm:flex-row sm:justify-end">
                <a th:href="@{/products}"
                   class="inline-flex items-center justify-center rounded-xl border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
                    Cancel
                </a>
                <button type="submit"
                        class="inline-flex items-center justify-center rounded-xl bg-sky-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-sky-700">
                    Update Product
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
