spring.application.name=demo

# Cấu hình kết nối MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/j2ee
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cấu hình Hibernate/JPA cho MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Cấu hình Multipart File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Cấu hình thư mục chứa ảnh tĩnh
spring.mvc.static-path-pattern=/images/**
spring.web.resources.static-locations=file:images/